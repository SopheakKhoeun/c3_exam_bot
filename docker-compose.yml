services:
  postgres:
    image: postgres:16
    container_name: exam_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exam_bot
    ports:
      - "5432:5432"
    volumes:
      - exam_bot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exam_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: exam_bot_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/exam_bot?schema=public
      TZ_SCHEDULE: Asia/Phnom_Penh
    ports:
      - "3000:3000"

volumes:
  exam_bot_pgdata:
